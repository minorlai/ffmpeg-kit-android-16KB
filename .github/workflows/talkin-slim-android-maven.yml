name: talkin slim android maven

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to Maven Central after the AAR is verified"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    tags:
      - "v6.1.2"

jobs:
  build-and-publish:
    name: build slim 16KB aar
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash
    env:
      ANDROID_NDK_VERSION: "27.0.12077973"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: set up jdk 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: set up android sdk and ndk
        run: |
          set +o pipefail
          yes | "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null
          set -o pipefail
          "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "cmake;3.22.1" \
            "ndk;${ANDROID_NDK_VERSION}"
          echo "ANDROID_SDK_ROOT=${ANDROID_HOME}" >> "${GITHUB_ENV}"
          echo "ANDROID_NDK_ROOT=${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}" >> "${GITHUB_ENV}"

      - name: build talkin slim aar
        run: bash scripts/build-talkin-slim-android.sh --force

      - name: print build log on failure
        if: ${{ failure() }}
        run: |
          if [ -f build.log ]; then
            tail -300 build.log
          fi

      - name: verify talkin slim aar
        run: bash scripts/verify-talkin-slim-aar.sh

      - name: upload talkin slim aar
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-kit-talkin-slim-16kb-6.1.2
          path: ffmpeg-kit-talkin-slim-16kb.aar
          if-no-files-found: error

      - name: prepare publishing credentials
        if: ${{ github.ref == 'refs/tags/v6.1.2' || inputs.publish == 'true' }}
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          SIGNING_IN_MEMORY_KEY: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          SIGNING_IN_MEMORY_KEY_BASE64: ${{ secrets.SIGNING_IN_MEMORY_KEY_BASE64 }}
          SIGNING_IN_MEMORY_KEY_ID: ${{ secrets.SIGNING_IN_MEMORY_KEY_ID }}
          SIGNING_IN_MEMORY_KEY_PASSWORD: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
        run: |
          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          required = [
              "MAVEN_CENTRAL_USERNAME",
              "MAVEN_CENTRAL_PASSWORD",
              "SIGNING_IN_MEMORY_KEY_PASSWORD",
          ]
          missing = [name for name in required if not os.environ.get(name)]
          if missing:
              raise SystemExit(f"Missing GitHub secrets: {', '.join(missing)}")

          key_base64 = os.environ.get("SIGNING_IN_MEMORY_KEY_BASE64", "").strip()
          if key_base64:
              key = base64.b64decode(key_base64).decode("utf-8").strip()
          else:
              key = os.environ.get("SIGNING_IN_MEMORY_KEY", "").strip()
              key = key.replace("\\r\\n", "\n").replace("\\n", "\n").replace("\r\n", "\n")

          if "BEGIN PGP PRIVATE KEY BLOCK" not in key:
              raise SystemExit("SIGNING_IN_MEMORY_KEY or SIGNING_IN_MEMORY_KEY_BASE64 must contain an ASCII-armored private key block.")

          def prop(value: str) -> str:
              return (
                  value
                  .replace("\\", "\\\\")
                  .replace("\n", "\\n")
                  .replace("\r", "")
                  .replace(":", "\\:")
                  .replace("=", "\\=")
              )

          key_file = Path(os.environ["RUNNER_TEMP"]) / "signing-key.asc"
          key_file.write_text(key + "\n", encoding="utf-8")

          gradle_dir = Path.home() / ".gradle"
          gradle_dir.mkdir(parents=True, exist_ok=True)
          props = gradle_dir / "gradle.properties"
          with props.open("a", encoding="utf-8") as f:
              f.write("\n")
              f.write(f"mavenCentralUsername={prop(os.environ['MAVEN_CENTRAL_USERNAME'])}\n")
              f.write(f"mavenCentralPassword={prop(os.environ['MAVEN_CENTRAL_PASSWORD'])}\n")
              key_id = os.environ.get("SIGNING_IN_MEMORY_KEY_ID", "").strip()
              if key_id:
                  f.write(f"signing.gnupg.keyName={prop(key_id)}\n")
              f.write("signing.gnupg.executable=gpg\n")
              f.write("signing.gnupg.useLegacyGpg=false\n")
              f.write(f"signing.gnupg.passphrase={prop(os.environ['SIGNING_IN_MEMORY_KEY_PASSWORD'])}\n")
          PY

          mkdir -p "${HOME}/.gnupg"
          chmod 700 "${HOME}/.gnupg"
          echo "allow-loopback-pinentry" > "${HOME}/.gnupg/gpg-agent.conf"
          gpgconf --kill gpg-agent || true
          gpg --batch --import "${RUNNER_TEMP}/signing-key.asc"
          KEY_NAME="${SIGNING_IN_MEMORY_KEY_ID}"
          if [ -z "${KEY_NAME}" ]; then
            KEY_NAME="$(gpg --batch --with-colons --list-secret-keys | awk -F: '/^sec:/ { print $5; exit }')"
            echo "signing.gnupg.keyName=${KEY_NAME}" >> "${HOME}/.gradle/gradle.properties"
          fi
          printf "signing smoke test" > "${RUNNER_TEMP}/signing-smoke.txt"
          gpg --batch --yes --pinentry-mode loopback --passphrase "${SIGNING_IN_MEMORY_KEY_PASSWORD}" \
            --local-user "${KEY_NAME}" --armor --detach-sign \
            --output "${RUNNER_TEMP}/signing-smoke.txt.asc" "${RUNNER_TEMP}/signing-smoke.txt"

      - name: publish to maven central
        if: ${{ github.ref == 'refs/tags/v6.1.2' || inputs.publish == 'true' }}
        working-directory: android
        run: ./gradlew publishAndReleaseToMavenCentral --no-daemon --no-configuration-cache

      - name: print maven coordinates
        if: ${{ github.ref == 'refs/tags/v6.1.2' || inputs.publish == 'true' }}
        run: |
          echo "io.github.minorlai:ffmpeg-kit-16kb:6.1.2"
          echo "https://central.sonatype.com/artifact/io.github.minorlai/ffmpeg-kit-16kb/6.1.2"
